<!DOCTYPE html>
<html>
<head>
    <title>Week 10 - Web App</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 50px; background-color: #f4f4f9; }
        .login-box { background: white; padding: 25px; border-radius: 8px; width: 320px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        input[type=text], input[type=password] { width: 90%; padding: 10px; margin: 10px 0 20px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #ff9900; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%; }
        button:hover { background: #e68a00; }
        #message { font-weight: bold; margin-bottom: 15px; padding: 10px; border-radius: 4px; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block !important; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block !important; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>System Login 🚀</h2>
        
        <div id="message"></div>
        
        <label>Username (Hint: admin)</label>
        <input type="text" id="username" placeholder="Enter username" required>
        
        <label>Password (Hint: cloud2026)</label>
        <input type="password" id="password" placeholder="Enter password" required>
        
        <button onclick="checkLogin()">Secure Login</button>
    </div>

    <script>
        // JavaScript Logic to make the application functional
        function checkLogin() {
            var user = document.getElementById("username").value;
            var pass = document.getElementById("password").value;
            var msgBox = document.getElementById("message");
            
            if (user === "admin" && pass === "cloud2026") {
                msgBox.innerHTML = "✅ Login Successful! Welcome to the Week 10 Dashboard.";
                msgBox.className = "success";
            } else {
                msgBox.innerHTML = "❌ Invalid Credentials. Please try again.";
                msgBox.className = "error";
            }
        }
    </script>
</body>
</html>
